<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Football Game 6v6</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; }
    #app { width: 100%; height: 100%; }
    canvas { display: block; }
    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #loading-screen h1 {
      font-size: 4rem; font-weight: 800;
      background: linear-gradient(90deg, #ff6b35, #f7931e, #ffd700);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -2px; margin-bottom: 1rem;
    }
    #loading-screen .subtitle { font-size: 1.2rem; color: #888; margin-bottom: 2rem; }
    .loader-bar {
      width: 300px; height: 4px; background: #1a1a2e; border-radius: 2px; overflow: hidden;
    }
    .loader-bar-inner {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #ff6b35, #f7931e);
      border-radius: 2px; animation: load 2s ease-in-out forwards;
    }
    @keyframes load { to { width: 100%; } }
    #loading-screen .loading-text { margin-top: 1rem; color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="loading-screen">
    <h1>3D FOOTBALL</h1>
    <div class="subtitle">6 vs 6</div>
    <div class="loader-bar"><div class="loader-bar-inner"></div></div>
    <div class="loading-text">Loading stadium...</div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
